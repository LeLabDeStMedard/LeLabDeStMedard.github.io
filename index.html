<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Metamorphoses</title>
    <style>
      :root { --accent-color: #FFFC00; }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      
      body, html { 
        margin: 0; padding: 0; width: 100%; height: 100%; 
        background: #000; overflow: hidden; 
        font-family: -apple-system, system-ui, sans-serif; 
      }

      #camera-view { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
      #camera-view canvas { width: 100% !important; height: 100% !important; object-fit: cover !important; }

      .ui-overlay {
        position: fixed; bottom: 0; left: 0; width: 100%;
        padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 20px);
        z-index: 10;
        background: linear-gradient(transparent, rgba(0,0,0,0.8));
      }

      .lens-carousel {
        display: flex;
        align-items: center;
        gap: 20px;
        overflow-x: auto;
        width: 100%;
        padding: 40px 50% !important; 
        scroll-snap-type: x mandatory;
        scrollbar-width: none;
        scroll-behavior: smooth;
      }
      .lens-carousel::-webkit-scrollbar { display: none; }
      
      .lens-item {
        flex: 0 0 60px !important;
        width: 60px !important;
        height: 60px !important;
        border-radius: 50% !important;
        background: rgba(255, 255, 255, 0.1);
        border: 1.5px solid rgba(255, 255, 255, 0.3) !important;
        display: flex;
        align-items: center;
        justify-content: center;
        scroll-snap-align: center;
        cursor: pointer;
        position: relative;
        transition: border-color 0.3s;
      }
      
      /* État sélectionné : Bordure jaune + Point en dessous */
      .lens-item.active { 
        border-color: var(--accent-color) !important;
        border-width: 2px !important;
      }

      /* Création du point jaune sous l'élément actif */
      .lens-item.active::after {
        content: '';
        position: absolute;
        bottom: -12px; /* Ajustez la distance ici */
        left: 50%;
        transform: translateX(-50%);
        width: 6px;
        height: 6px;
        background-color: var(--accent-color);
        border-radius: 50%;
        box-shadow: 0 0 8px var(--accent-color);
        animation: fadeIn 0.3s ease-out;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translate(-50%, 5px); }
        to { opacity: 1; transform: translate(-50%, 0); }
      }
      
      .lens-item img { 
        width: 100% !important; 
        height: 100% !important; 
        border-radius: 50% !important;
        object-fit: cover !important; 
        pointer-events: none;
      }
    </style>

    <script type="module" crossorigin src="./assets/index-CnbVTm_E.js"></script>
  </head>
  <body>
    
    <div id="camera-view">
      <div id="canvas-output"></div>
    </div>

    <div class="ui-overlay">
      <div id="lens-carousel" class="lens-carousel"></div>
    </div>

    <script>
      const carousel = document.getElementById('lens-carousel');

      const updateActiveLens = () => {
        const items = document.querySelectorAll('.lens-item');
        if (items.length === 0) return;

        const carouselRect = carousel.getBoundingClientRect();
        const center = carouselRect.left + (carouselRect.width / 2);

        let closest = null;
        let minDistance = Infinity;

        items.forEach(item => {
          const rect = item.getBoundingClientRect();
          const itemCenter = rect.left + (rect.width / 2);
          const dist = Math.abs(center - itemCenter);

          if (dist < minDistance) {
            minDistance = dist;
            closest = item;
          }
        });

        if (closest && !closest.classList.contains('active')) {
          items.forEach(i => i.classList.remove('active'));
          closest.classList.add('active');
          // Déclenche l'activation du filtre
          closest.click();
        }
      };

      const initUI = () => {
        const firstItem = document.querySelector('.lens-item');
        if (firstItem) {
          // Centre le premier élément au départ
          firstItem.scrollIntoView({ inline: 'center' });
          setTimeout(() => {
            firstItem.click();
            updateActiveLens();
          }, 300);
        } else {
          setTimeout(initUI, 100);
        }
      };

      carousel.addEventListener('scroll', () => {
        window.requestAnimationFrame(updateActiveLens);
      });

      carousel.addEventListener('click', (e) => {
        const item = e.target.closest('.lens-item');
        if (item) {
          item.scrollIntoView({ behavior: 'smooth', inline: 'center' });
        }
      });

      window.addEventListener('load', initUI);
    </script>
  </body>
</html>
