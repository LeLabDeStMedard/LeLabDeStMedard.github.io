<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Metamorphoses</title>
    <style>
      :root { --accent-color: #FFFC00; }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      
      body, html { 
        margin: 0; padding: 0; width: 100%; height: 100%; 
        background: #000; overflow: hidden; 
        font-family: -apple-system, system-ui, sans-serif; 
      }

      #camera-view { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
      #camera-view canvas { width: 100% !important; height: 100% !important; object-fit: cover !important; }

      .ui-overlay {
        position: fixed; bottom: 0; left: 0; width: 100%;
        padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 20px);
        z-index: 10;
        background: linear-gradient(transparent, rgba(0,0,0,0.8));
      }

      .lens-carousel {
        display: flex;
        align-items: center;
        gap: 20px;
        overflow-x: auto;
        width: 100%;
        padding: 60px 50%; /* Padding vertical augmenté pour laisser de la place au scale */
        scroll-snap-type: x mandatory;
        scrollbar-width: none;
        scroll-behavior: smooth;
      }
      .lens-carousel::-webkit-scrollbar { display: none; }
      
      .lens-item {
        flex: 0 0 65px;
        height: 65px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.1);
        border: 2px solid rgba(255, 255, 255, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        scroll-snap-align: center;
        /* Transition fluide pour l'agrandissement */
        transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.3s, background 0.4s;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        cursor: pointer;
        position: relative;
      }
      
      /* L'ÉLÉMENT ACTIF RESTE GROS ICI */
      .lens-item.active { 
        transform: scale(1.65); /* Agrandissement permanent quand actif */
        border-color: var(--accent-color);
        background: rgba(255, 255, 255, 0.25);
        z-index: 100; /* Toujours au premier plan */
        box-shadow: 0 0 15px rgba(255, 252, 0, 0.3);
      }
      
      .lens-item img { 
        width: 100%; 
        height: 100%; 
        border-radius: 50%;
        object-fit: cover; 
      }
    </style>

    <script type="module" crossorigin src="./assets/index-CnbVTm_E.js"></script>
  </head>
  <body>
    
    <div id="camera-view">
      <div id="canvas-output"></div>
    </div>

    <div class="ui-overlay">
      <div id="lens-carousel" class="lens-carousel">
        </div>
    </div>

    <script>
      const carousel = document.getElementById('lens-carousel');
      let lastActiveItem = null;

      const updateActiveLens = () => {
        const items = document.querySelectorAll('.lens-item');
        if (items.length === 0) return;

        const carouselRect = carousel.getBoundingClientRect();
        const carouselCenter = carouselRect.left + (carouselRect.width / 2);

        let closestItem = null;
        let minDistance = Infinity;

        items.forEach(item => {
          const rect = item.getBoundingClientRect();
          const itemCenter = rect.left + (rect.width / 2);
          const distance = Math.abs(carouselCenter - itemCenter);

          if (distance < minDistance) {
            minDistance = distance;
            closestItem = item;
          }
        });

        // Si l'élément au centre change
        if (closestItem && closestItem !== lastActiveItem) {
          items.forEach(item => item.classList.remove('active'));
          closestItem.classList.add('active');
          lastActiveItem = closestItem;
          
          // Déclenche le filtre (important pour votre JS externe)
          closestItem.click();
        }
      };

      // Initialisation forcée du premier filtre
      const initFirstFilter = () => {
        const firstItem = document.querySelector('.lens-item');
        if (firstItem) {
          firstItem.scrollIntoView({ inline: 'center' });
          
          // Petit délai pour s'assurer que le scroll est fini avant le click
          setTimeout(() => {
            firstItem.click();
            updateActiveLens();
          }, 350);
        } else {
          setTimeout(initFirstFilter, 100);
        }
      };

      // Événements
      carousel.addEventListener('scroll', () => {
        // On utilise requestAnimationFrame pour une fluidité maximale sur mobile
        window.requestAnimationFrame(updateActiveLens);
      });
      
      carousel.addEventListener('click', (e) => {
        const item = e.target.closest('.lens-item');
        if (item) {
          item.scrollIntoView({ behavior: 'smooth', inline: 'center' });
        }
      });

      window.addEventListener('load', initFirstFilter);
    </script>
  </body>
</html>
