<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Metamorphoses</title>
    <style>
      :root { --accent-color: #FFFC00; }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      
      body, html { 
        margin: 0; padding: 0; width: 100%; height: 100%; 
        background: #000; overflow: hidden; 
        font-family: -apple-system, system-ui, sans-serif; 
      }

      #camera-view { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
      #camera-view canvas { width: 100% !important; height: 100% !important; object-fit: cover !important; }

      .ui-overlay {
        position: fixed; bottom: 0; left: 0; width: 100%;
        padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 30px);
        z-index: 10;
        background: linear-gradient(transparent, rgba(0,0,0,0.8));
      }

      .lens-carousel {
        display: flex;
        align-items: center;
        gap: 20px;
        overflow-x: auto;
        width: 100%;
        padding: 20px 50% !important; 
        scroll-snap-type: x mandatory;
        scrollbar-width: none;
        scroll-behavior: smooth;
        position: relative;
      }
      .lens-carousel::-webkit-scrollbar { display: none; }
      
      .lens-item {
        flex: 0 0 60px !important;
        width: 60px !important;
        height: 60px !important;
        border-radius: 50% !important;
        background: rgba(255, 255, 255, 0.1);
        border: 1.5px solid rgba(255, 255, 255, 0.2) !important;
        display: flex;
        align-items: center;
        justify-content: center;
        scroll-snap-align: center;
        cursor: pointer;
        position: relative;
        transition: border-color 0.3s ease;
      }
      
      /* État sélectionné : On allume la bordure */
      .lens-item.active { 
        border-color: var(--accent-color) !important;
        border-width: 2px !important;
      }

      /* LE PETIT POINT JAUNE EN DESSOUS */
      .lens-item.active::after {
        content: '';
        position: absolute;
        bottom: -15px; /* Position sous le logo */
        left: 50%;
        transform: translateX(-50%);
        width: 5px;
        height: 5px;
        background-color: var(--accent-color);
        border-radius: 50%;
        box-shadow: 0 0 5px var(--accent-color);
        animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      @keyframes popIn {
        0% { transform: translateX(-50%) scale(0); opacity: 0; }
        100% { transform: translateX(-50%) scale(1); opacity: 1; }
      }
      
      .lens-item img { 
        width: 100% !important; 
        height: 100% !important; 
        border-radius: 50% !important;
        object-fit: cover !important; 
        pointer-events: none;
      }
    </style>

    <script type="module" crossorigin src="./assets/index-CnbVTm_E.js"></script>
  </head>
  <body>
    
    <div id="camera-view">
      <div id="canvas-output"></div>
    </div>

    <div class="ui-overlay">
      <div id="lens-carousel" class="lens-carousel"></div>
    </div>

    <script>
      const carousel = document.getElementById('lens-carousel');
      let isInitialised = false;

      const updateActiveLens = () => {
        const items = document.querySelectorAll('.lens-item');
        if (items.length === 0) return;

        const carouselRect = carousel.getBoundingClientRect();
        const center = carouselRect.left + (carouselRect.width / 2);

        let closest = null;
        let minDistance = Infinity;

        items.forEach(item => {
          const rect = item.getBoundingClientRect();
          const itemCenter = rect.left + (rect.width / 2);
          const dist = Math.abs(center - itemCenter);

          if (dist < minDistance) {
            minDistance = dist;
            closest = item;
          }
        });

        if (closest && !closest.classList.contains('active')) {
          items.forEach(i => i.classList.remove('active'));
          closest.classList.add('active');
          // Déclenche l'activation réelle du filtre via le script externe
          closest.click();
        }
      };

      // Fonction pour forcer le démarrage sur le premier filtre
      const startFirstFilter = () => {
        const items = document.querySelectorAll('.lens-item');
        if (items.length > 0 && !isInitialised) {
          isInitialised = true;
          // On centre immédiatement le premier
          items[0].scrollIntoView({ inline: 'center', block: 'nearest' });
          
          // Petit délai pour simuler l'action utilisateur nécessaire au script de filtre
          setTimeout(() => {
            items[0].click();
            updateActiveLens();
          }, 300);
        } else if (!isInitialised) {
          // On attend que le script externe injecte les éléments
          setTimeout(startFirstFilter, 100);
        }
      };

      carousel.addEventListener('scroll', () => {
        window.requestAnimationFrame(updateActiveLens);
      });

      carousel.addEventListener('click', (e) => {
        const item = e.target.closest('.lens-item');
        if (item) {
          item.scrollIntoView({ behavior: 'smooth', inline: 'center' });
        }
      });

      // Lancement automatique
      window.addEventListener('load', startFirstFilter);
      // Sécurité si les éléments arrivent très vite
      setTimeout(startFirstFilter, 500);
    </script>
  </body>
</html>
