<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Metamorphoses</title>
    <style>
      :root { --accent-color: #FFFC00; }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      
      body, html { 
        margin: 0; padding: 0; width: 100%; height: 100%; 
        background: #000; overflow: hidden; 
        font-family: -apple-system, system-ui, sans-serif; 
      }

      #camera-view { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
      #camera-view canvas { width: 100% !important; height: 100% !important; object-fit: cover !important; }

      .ui-overlay {
        position: fixed; bottom: 0; left: 0; width: 100%;
        padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 20px);
        z-index: 10;
        background: linear-gradient(transparent, rgba(0,0,0,0.8));
      }

      .lens-carousel {
        display: flex;
        align-items: center;
        gap: 25px;
        overflow-x: auto;
        width: 100%;
        padding: 60px 50% !important; 
        scroll-snap-type: x mandatory;
        scrollbar-width: none;
        scroll-behavior: smooth;
      }
      .lens-carousel::-webkit-scrollbar { display: none; }
      
      /* Style de base des icônes */
      .lens-item {
        flex: 0 0 60px !important;
        width: 60px !important;
        height: 60px !important;
        border-radius: 50% !important;
        background: rgba(255, 255, 255, 0.1);
        border: 2px solid rgba(255, 255, 255, 0.3) !important;
        display: flex;
        align-items: center;
        justify-content: center;
        scroll-snap-align: center;
        transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) !important;
        cursor: pointer;
        position: relative;
      }
      
      /* FORCE L'AGRANDISSEMENT PERMANENT */
      .lens-item.active { 
        transform: scale(1.7) !important; 
        border-color: var(--accent-color) !important;
        border-width: 3px !important;
        z-index: 999 !important;
      }
      
      .lens-item img { 
        width: 100% !important; 
        height: 100% !important; 
        border-radius: 50% !important;
        object-fit: cover !important; 
        pointer-events: none;
      }
    </style>

    <script type="module" crossorigin src="./assets/index-CnbVTm_E.js"></script>
  </head>
  <body>
    
    <div id="camera-view">
      <div id="canvas-output"></div>
    </div>

    <div class="ui-overlay">
      <div id="lens-carousel" class="lens-carousel"></div>
    </div>

    <script>
      const carousel = document.getElementById('lens-carousel');

      // Fonction de mise à jour de l'état "Actif"
      const updateActiveState = () => {
        const items = document.querySelectorAll('.lens-item');
        if (items.length === 0) return;

        const carouselRect = carousel.getBoundingClientRect();
        const centerPoint = carouselRect.left + (carouselRect.width / 2);

        let closest = null;
        let minDistance = Infinity;

        items.forEach(item => {
          const rect = item.getBoundingClientRect();
          const itemCenter = rect.left + (rect.width / 2);
          const dist = Math.abs(centerPoint - itemCenter);

          if (dist < minDistance) {
            minDistance = dist;
            closest = item;
          }
        });

        if (closest && !closest.classList.contains('active')) {
          items.forEach(i => i.classList.remove('active'));
          closest.classList.add('active');
          // On clique pour activer le shader du filtre
          closest.click();
        }
      };

      // Initialisation répétée au début pour contrer l'injection JS tardive
      const forceInit = () => {
        const first = document.querySelector('.lens-item');
        if (first) {
          first.scrollIntoView({ inline: 'center', block: 'nearest' });
          setTimeout(() => {
            first.click();
            updateActiveState();
          }, 200);
        } else {
          setTimeout(forceInit, 100);
        }
      };

      carousel.addEventListener('scroll', () => {
        window.requestAnimationFrame(updateActiveState);
      });

      carousel.addEventListener('click', (e) => {
        const item = e.target.closest('.lens-item');
        if (item) {
          item.scrollIntoView({ behavior: 'smooth', inline: 'center' });
        }
      });

      // On lance dès que possible
      window.addEventListener('load', forceInit);
      // Sécurité si le 'load' est déjà passé
      setTimeout(forceInit, 500);
    </script>
  </body>
</html>
