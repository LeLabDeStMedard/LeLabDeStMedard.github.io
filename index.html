<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Metamorphoses</title>
    <style>
      :root { --accent-color: #FFFC00; }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      
      body, html { 
        margin: 0; padding: 0; width: 100%; height: 100%; 
        background: #000; overflow: hidden; 
        font-family: -apple-system, system-ui, sans-serif; 
      }

      #camera-view { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
      #camera-view canvas { width: 100% !important; height: 100% !important; object-fit: cover !important; }

      .ui-overlay {
        position: fixed; bottom: 0; left: 0; width: 100%;
        padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 20px);
        z-index: 10;
        background: linear-gradient(transparent, rgba(0,0,0,0.8));
      }

      .lens-carousel {
        display: flex;
        align-items: center;
        gap: 15px;
        overflow-x: auto;
        width: 100%;
        padding: 40px 50%; /* Garde le centrage */
        scroll-snap-type: x mandatory;
        scrollbar-width: none;
        scroll-behavior: smooth;
      }
      .lens-carousel::-webkit-scrollbar { display: none; }
      
      .lens-item {
        flex: 0 0 60px;
        height: 60px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.1);
        border: 1.5px solid rgba(255, 255, 255, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        scroll-snap-align: center;
        transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), border-color 0.3s, background 0.3s;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        cursor: pointer;
      }
      
      .lens-item.active { 
        transform: scale(1.5); 
        border-color: var(--accent-color);
        border-width: 2px;
        background: rgba(255, 255, 255, 0.2);
        z-index: 2;
      }
      
      .lens-item img { 
        width: 100%; 
        height: 100%; 
        border-radius: 50%;
        object-fit: cover; 
      }
    </style>

    <script type="module" crossorigin src="./assets/index-CnbVTm_E.js"></script>
  </head>
  <body>
    
    <div id="camera-view">
      <div id="canvas-output"></div>
    </div>

    <div class="ui-overlay">
      <div class="lens-carousel" id="lens-carousel">
          </div>
    </div>

    <script>
      const carousel = document.getElementById('lens-carousel');

      const updateActiveLens = () => {
        const items = document.querySelectorAll('.lens-item');
        if (items.length === 0) return;

        const carouselRect = carousel.getBoundingClientRect();
        const carouselCenter = carouselRect.left + (carouselRect.width / 2);

        let closestItem = null;
        let minDistance = Infinity;

        items.forEach(item => {
          const rect = item.getBoundingClientRect();
          const itemCenter = rect.left + (rect.width / 2);
          const distance = Math.abs(carouselCenter - itemCenter);

          if (distance < minDistance) {
            minDistance = distance;
            closestItem = item;
          }
        });

        if (closestItem && !closestItem.classList.contains('active')) {
          items.forEach(item => item.classList.remove('active'));
          closestItem.classList.add('active');
          
          // Dispatch d'un événement personnalisé si votre script de filtre 
          // a besoin de savoir quel filtre est actif
          closestItem.dispatchEvent(new CustomEvent('lensSelected', { bubbles: true }));
        }
      };

      // Force le premier filtre au démarrage
      const selectInitialLens = () => {
        const items = document.querySelectorAll('.lens-item');
        if (items.length > 0) {
          // On centre le premier élément
          items[0].scrollIntoView({ inline: 'center' });
          // On déclenche manuellement la mise à jour visuelle
          updateActiveLens();
        } else {
          // Si les items ne sont pas encore là (injection JS lente), on réessaie
          setTimeout(selectInitialLens, 100);
        }
      };

      carousel.addEventListener('scroll', updateActiveLens);
      
      carousel.addEventListener('click', (e) => {
        const item = e.target.closest('.lens-item');
        if (item) {
          item.scrollIntoView({ behavior: 'smooth', inline: 'center' });
        }
      });

      // Lancement de l'initialisation
      window.addEventListener('load', selectInitialLens);
    </script>
  </body>
</html>
