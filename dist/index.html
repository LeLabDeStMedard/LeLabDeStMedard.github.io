<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Metamorphoses - Camera Kit</title>
    <style>
      :root { --snap-yellow: #FFFC00; }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      
      body, html { 
        margin: 0; padding: 0; width: 100%; height: 100%; 
        background: #000; overflow: hidden; 
        font-family: -apple-system, system-ui, sans-serif; 
      }

      #camera-view { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
      #camera-view canvas { width: 100% !important; height: 100% !important; object-fit: cover !important; }

      /* --- INTERFACE --- */
      .ui-overlay {
        position: fixed; bottom: 0; left: 0; width: 100%;
        padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 20px); /* Un peu plus d'espace en bas */
        z-index: 10; display: flex; flex-direction: column; align-items: center;
      }
      .lens-carousel {
        display: flex; gap: 12px; overflow-x: auto; width: 100%;
        padding: 10px 50% 10px 50%; scroll-snap-type: x mandatory;
        scrollbar-width: none;
      }
      .lens-carousel::-webkit-scrollbar { display: none; }
      .lens-item {
        flex: 0 0 60px; height: 60px; border-radius: 50%;
        background: rgba(0, 0, 0, 0.3); border: 1.5px solid rgba(255, 255, 255, 0.5);
        display: flex; align-items: center; justify-content: center;
        scroll-snap-align: center; transition: transform 0.2s;
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        overflow: hidden; cursor: pointer;
      }
      .lens-item.active { transform: scale(1.15); border-color: var(--snap-yellow); border-width: 2px; }
      .lens-item img { width: 100%; height: 100%; object-fit: cover; }
    </style>
    <script type="module" crossorigin src="./assets/index-wSTAN8BN.js"></script>
  </head>
  <body>
    
    <div id="camera-view">
      <div id="canvas-output"></div>
    </div>

    <div class="ui-overlay">
      <div class="lens-carousel" id="lens-carousel"></div>
    </div>

  </body>
</html>
